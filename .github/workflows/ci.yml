name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Opt into Node 24 for the GitHub Actions runtime that executes
      # actions/checkout and actions/setup-node themselves. The default
      # internal runtime is Node 20 and will be forced to 24 on
      # 2026-06-02 per GitHub's deprecation schedule; this flag silences
      # the deprecation annotation that fires on every run until then.
      # Our own build still uses the project's pinned Node (24.x via
      # engines.node + .nvmrc) installed by setup-node below.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm run test

      - name: Build (next build)
        # No env vars required: every entry in src/lib/config.ts is
        # .optional() and routed through a blankToUndefined preprocessor,
        # so the build resolves to the mock-backend fallback rather than
        # hitting real services. Real prod secrets live in Vercel env vars
        # and are never consumed by this workflow.
        run: npm run build
